<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0f172a">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>{% block title %}SAMU-GLOBAL KITS{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 500: '#6366f1', 600: '#4f46e5', 700: '#4338ca' }
          }
        }
      }
    }
  </script>
  {% block head %}{% endblock %}
</head>
<body class="min-h-screen min-h-[100dvh] bg-slate-950 text-slate-100 antialiased">
  {% block body %}{% endblock %}
</body>
</html>
