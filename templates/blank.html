<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title></title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      min-height: 100vh;
      overflow: hidden;
    }

    body {
      position: relative;
      background: #f8f8fc;
    }

    /* Capa base: rosa y azul suaves (+20% blanco) */
    body::before {
      content: "";
      position: fixed;
      inset: -50%;
      width: 200%;
      height: 200%;
      background: linear-gradient(
        135deg,
        rgba(255, 214, 232, 0.72) 0%,
        rgba(214, 232, 255, 0.72) 35%,
        rgba(255, 255, 255, 0.88) 50%,
        rgba(230, 210, 255, 0.68) 65%,
        rgba(200, 228, 255, 0.72) 100%
      );
      background-size: 400% 400%;
      animation: degradado-dinamico 14s ease-in-out infinite;
      z-index: 0;
    }

    /* Capa de luz: empuja el tono un 20% hacia blanco */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background: linear-gradient(
        160deg,
        rgba(255, 255, 255, 0.2) 0%,
        rgba(255, 255, 255, 0.08) 45%,
        rgba(255, 255, 255, 0.22) 100%
      );
      pointer-events: none;
      z-index: 1;
    }

    @keyframes degradado-dinamico {
      0% {
        transform: translate(0, 0) rotate(0deg);
        background-position: 0% 50%;
      }
      25% {
        background-position: 50% 100%;
      }
      50% {
        transform: translate(-5%, -3%) rotate(2deg);
        background-position: 100% 50%;
      }
      75% {
        background-position: 50% 0%;
      }
      100% {
        transform: translate(0, 0) rotate(0deg);
        background-position: 0% 50%;
      }
    }

    .bienvenido {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
      font-family: "Segoe UI", system-ui, sans-serif;
      font-size: clamp(2.5rem, 8vw, 5rem);
      font-weight: 700;
      letter-spacing: 0.35em;
      text-indent: 0.35em;
      color: rgba(255, 255, 255, 0.95);
      text-shadow: 0 2px 24px rgba(120, 100, 180, 0.35);
      pointer-events: none;
      user-select: none;
    }
  </style>
</head>
<body>
  <h1 class="bienvenido">BIENVENIDO</h1>
</body>
</html>
